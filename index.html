<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>Flowers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Partículas de fondo */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 6s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        .greeting-container {
            margin-bottom: 30px;
        }

        .greeting-text {
            font-size: 3.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
        }

        .greeting-text span {
            display: inline-block;
            animation: bounce 1s ease-in-out infinite;
        }

        .greeting-text span:nth-child(1) { animation-delay: 0s; }
        .greeting-text span:nth-child(2) { animation-delay: 0.1s; }
        .greeting-text span:nth-child(3) { animation-delay: 0.2s; }
        .greeting-text span:nth-child(4) { animation-delay: 0.3s; }
        .greeting-text span:nth-child(5) { animation-delay: 0.4s; }
        .greeting-text span:nth-child(6) { animation-delay: 0.5s; }
        .greeting-text span:nth-child(7) { animation-delay: 0.6s; }
        .greeting-text span:nth-child(8) { animation-delay: 0.7s; }
        .greeting-text span:nth-child(9) { animation-delay: 0.8s; }
        .greeting-text span:nth-child(10) { animation-delay: 0.9s; }
        .greeting-text span:nth-child(11) { animation-delay: 1s; }
        .greeting-text span:nth-child(12) { animation-delay: 1.1s; }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-20px) scale(1.1);
            }
        }

        .name {
            font-size: 5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b9d, #ffd93d, #6bcf7f, #4facfe);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite, pulse 2s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 107, 157, 0.5);
            margin: 20px 0;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .description {
            font-size: 1.5rem;
            color: #fff;
            margin: 30px 0;
            opacity: 0;
            animation: fadeIn 1s ease-in 1s forwards;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .hearts {
            font-size: 2rem;
            margin: 20px 0;
            opacity: 0;
            animation: fadeIn 1s ease-in 1.5s forwards;
        }

        .hearts span {
            display: inline-block;
            animation: heartBeat 1.5s ease-in-out infinite;
            margin: 0 5px;
        }

        .hearts span:nth-child(1) { animation-delay: 0s; }
        .hearts span:nth-child(2) { animation-delay: 0.2s; }
        .hearts span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes heartBeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.3);
            }
            50% {
                transform: scale(1);
            }
        }

        .button {
            margin-top: 40px;
            opacity: 0;
            animation: fadeIn 1s ease-in 2s forwards;
        }

        .btn {
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff6b9d, #c471ed);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        /* Flores decorativas */
        .flower-decoration {
            position: absolute;
            font-size: 3rem;
            opacity: 0.3;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .flower-decoration:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .flower-decoration:nth-child(2) {
            top: 15%;
            right: 15%;
            animation-delay: 2s;
        }

        .flower-decoration:nth-child(3) {
            bottom: 15%;
            left: 15%;
            animation-delay: 4s;
        }

        .flower-decoration:nth-child(4) {
            bottom: 10%;
            right: 10%;
            animation-delay: 6s;
        }

        @media (max-width: 768px) {
            .greeting-text {
                font-size: 2rem;
            }
            .name {
                font-size: 3rem;
            }
            .description {
                font-size: 1.2rem;
            }
            .btn {
                padding: 15px 35px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>
    <!-- Flores decorativas -->
    <div class="flower-decoration">🌸</div>
    <div class="flower-decoration">🌺</div>
    <div class="flower-decoration">🌻</div>
    <div class="flower-decoration">🌹</div>

    <!-- Partículas de fondo -->
    <script>
        for(let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(particle);
        }
    </script>

    <div class="container">
        <div class="greeting-container">
            <div class="greeting-text">
                <span>H</span><span>o</span><span>l</span><span>a</span>
            </div>
            <div class="name">PAME</div>
        </div>

        <div class="description">
            Espero que te guste este detalle
        </div>

        <div class="hearts">
            <span>💖</span>
            <span>🌷</span>
            <span>💖</span>
        </div>

        <div class="button">
            <a href="flower.html" class="btn">
                <span>VER TU SORPRESA ✨</span>
            </a>
        </div>
    </div>

</body>

</html>
